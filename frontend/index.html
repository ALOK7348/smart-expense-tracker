<!DOCTYPE html>
<html>

<head>

<title>Smart Expense Tracker</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Expense Tracker</h1>

<p class="subtitle">

Track and manage your daily expenses smartly 🚀

</p>

<div class="form-container">

<input
id="title"
type="text"
placeholder="Expense Title">

<input
id="amount"
type="number"
placeholder="Amount">

<select id="category">

<option>Food</option>

<option>Travel</option>

<option>Shopping</option>

<option>Gym</option>

<option>Other</option>

</select>

<button id="addBtn">

Add Expense

</button>

</div>

<h2 id="totalExpense">

Total: ₹0

</h2>

<select id="filterCategory">

<option value="All">

All Categories

</option>

<option value="Food">

Food

</option>

<option value="Travel">

Travel

</option>

<option value="Shopping">

Shopping

</option>

<option value="Gym">

Gym

</option>

<option value="Other">

Other

</option>

</select>

<div id="expenseList">
    <h2>Expenses</h2>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
